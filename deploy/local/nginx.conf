# Local stand-in for the ALB: balances across api replicas started with
#   docker compose --profile scale up -d --scale api=3
# Re-resolves the service name per request so new/dead replicas are
# picked up instead of pinning the first IP forever.
events {}

http {
  server {
    listen 8090;

    location / {
      resolver 127.0.0.11 valid=5s;
      set $upstream http://api:8080;
      proxy_pass $upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $http_connection;
      proxy_set_header Host $host;
      proxy_read_timeout 300s;
    }
  }
}
