services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # SQS-compatible queue for local dev; in AWS this is a real SQS queue.
  elasticmq:
    image: softwaremill/elasticmq-native:1.6.5
    ports:
      - "9324:9324"
    volumes:
      - ./deploy/local/elasticmq.conf:/opt/elasticmq.conf:ro

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment: &appenv
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://arena:arena@postgres:5432/arena
      SQS_ENDPOINT: http://elasticmq:9324
      SQS_QUEUE_URL: http://elasticmq:9324/000000000000/moves
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticmq:
        condition: service_started

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      <<: *appenv
      MODEL_PATH: /models/blundernet.onnx
      ENGINE_SIMS: 300
    volumes:
      - ./models:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticmq:
        condition: service_started
